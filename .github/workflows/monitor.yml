name: Health Reserve Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check availability
        run: npm run check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TARGET_MONTH: "2026-07"
          BEFORE_DATE: "2026-07-23"
          COURSE_ID: "105"
          FACILITY_ID: "3"
      - name: Save notified dates
        run: |
          if [ -n "$(git status --porcelain state/notified.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/notified.json
            git commit -m "Update notified health reserve dates [skip ci]"
            git push
          else
            echo "No notification state changes."
          fi
